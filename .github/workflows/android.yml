name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build

    - name: Print lint report
      if: failure()
      run: |
        for f in app/build/intermediates/lint_intermediate_text_report/*/lintReportDebug/lint-results-debug.txt; do
          [ -f "$f" ] && cat "$f"
        done || true

    - name: Upload lint reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: |
          app/build/reports/lint-results-*.html
          app/build/intermediates/lint_intermediate_text_report/**/lint-results-*.txt
        if-no-files-found: ignore
